<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Make a Donation</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <!-- Navbar (reuse the same from home page) -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
      <a class="navbar-brand" href="#">Zakat System</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="#">Make a Donation</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Type of Donation</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Donation History</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Login / Profile</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Help & FAQ</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Donation Form -->
  <section class="py-5">
    <div class="container">
      <h2 class="mb-4 text-center">Make a Donation</h2>
      <form>
        <div class="mb-3">
          <label for="fullName" class="form-label">Full Name</label>
          <input type="text" class="form-control" id="fullName" placeholder="Enter your name" required>
        </div>

        <div class="mb-3">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
        </div>

        <div class="mb-3">
          <label for="phone" class="form-label">Phone Number</label>
          <input type="tel" class="form-control" id="phone" placeholder="Enter your phone number" required>
        </div>

        <div class="mb-3">
          <label for="donationType" class="form-label">Donation Type</label>
          <select class="form-select" id="donationType" required>
            <option value="" disabled selected>Select type</option>
            <option value="zakat">Zakat</option>
            <option value="infaq">Infaq</option>
            <option value="sadaqah">Sadaqah</option>
            <option value="wakaf">Wakaf</option>
          </select>
        </div>

        <div class="mb-3">
          <label for="amount" class="form-label">Amount (RM)</label>
          <input type="number" class="form-control" id="amount" min="1" placeholder="Enter amount" required>
        </div>

        <div class="mb-3">
          <label for="message" class="form-label">Message / Notes (Optional)</label>
          <textarea class="form-control" id="message" rows="3" placeholder="Any specific intention or message?"></textarea>
        </div>

        <div class="mb-3">
          <label class="form-label">Payment Method</label>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="paymentMethod" id="fpx" value="fpx" checked>
            <label class="form-check-label" for="fpx">FPX (Coming Soon)</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="paymentMethod" id="bank" value="bank">
            <label class="form-check-label" for="bank">Manual Bank Transfer</label>
          </div>
        </div>

        <button type="submit" class="btn btn-primary">Submit Donation</button>
      </form>
    </div>
  </section>

  <footer style="background-color: #333; color: #fff; padding: 25px 20px; text-align: center; font-size: 0.95em;">
  <p>&copy; 2025 Masjid Prima Saujana Kajang Donation System</p>
  <p>Developed for community service and charitable giving</p>
  <p>Email: <a href="mailto:info@masjidprimasaujana.my" style="color: #ffa726;">info@masjidprimasaujana.my</a> |
     Tel: 03-1234 5678</p>
</footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
